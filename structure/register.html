<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kamiwear Immersive Login Page</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;family=Syne:wght@700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f9e806",
                        "background-light": "#f8f8f5",
                        "background-dark": "#0A0812",
                        "brand-purple": "#6d28d9",
                        "brand-lavender": "#a78bfa",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "syne": ["Syne", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .liquid-glow {
            background: radial-gradient(circle at center, rgba(109, 40, 217, 0.15) 0%, transparent 70%);
        }
        .input-glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .input-glass:focus {
            border-color: #f9e806;
            background: rgba(255, 255, 255, 0.08);
        }
        .floating-particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.2;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen relative overflow-hidden flex flex-col items-center justify-center">
<!-- Full-Page Background Gradient & Particles -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[1200px] h-[1200px] liquid-glow rounded-full"></div>
<!-- Decorative Anime Silhouette (Left) -->
<div class="absolute bottom-0 left-[-10%] opacity-10 h-full w-full max-w-[600px] pointer-events-none select-none">
<img alt="anime character silhouette standing in shadow" class="h-full w-full object-contain object-left-bottom grayscale invert" data-alt="faint anime character silhouette in background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA_8vE1XX5l4oWt5YIR7hjVicM6468ZXDeX0kj_hoEHX5Jhxr9lfE5TtANW1-YcrnwioDK7T1BEKQpfe1H13iD88Ms1z30pZo-F3U27eV3gavo3SNX6f409VxVf028bV-yhSCC9iJ3MYGpbt-Px7IQ4bjqTgf9hVfH1Cabm8RDd8_IxkimwytzWTwbhxiQHODSeGjAoLNHbpdxr8VTqAhIBiPrei12_S3nzZCMTdblUuoPphm2nb2o6glOQXA8KFee5dn5ff-ECQTjd"/>
</div>
<!-- Floating Particles (Static Mockup) -->
<div class="floating-particle w-1 h-1 top-1/4 left-1/3"></div>
<div class="floating-particle w-2 h-2 top-3/4 left-1/4"></div>
<div class="floating-particle w-1 h-1 top-1/2 right-1/4"></div>
<div class="floating-particle w-1.5 h-1.5 top-1/3 right-1/3"></div>
</div>
<!-- Floating Badge (Right) -->
<div class="hidden lg:flex absolute top-1/3 right-10 xl:right-40 z-20 items-center gap-3 px-6 py-4 glass-card rounded-xl">
<div class="w-10 h-10 rounded-full bg-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">monetization_on</span>
</div>
<div>
<p class="text-sm font-bold text-white leading-tight">Earn KamiKoins</p>
<p class="text-xs text-brand-lavender">Join the inner circle</p>
</div>
</div>
<!-- Top Navigation (Simplified from component) -->
<header class="absolute top-0 left-0 w-full z-50 px-10 py-8 flex items-center justify-between">
        <a href="index_v2.html" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
            <div class="text-primary">
                <span class="material-symbols-outlined text-4xl leading-none">diamond</span>
            </div>
            <h2 class="font-syne text-2xl font-bold tracking-widest text-white">KAMIWEAR</h2>
        </a>
<div class="hidden md:flex items-center gap-10">
<a class="text-slate-400 hover:text-white transition-colors text-sm font-medium" href="#">COLLECTIONS</a>
<a class="text-slate-400 hover:text-white transition-colors text-sm font-medium" href="#">DROP LIST</a>
<a class="text-slate-400 hover:text-white transition-colors text-sm font-medium" href="#">ABOUT</a>
</div>
</header>
<!-- Centered Auth Card -->
<main class="relative z-10 w-full max-w-[480px] px-6">
<div class="glass-card rounded-lg p-8 md:p-12 shadow-2xl">
<!-- Logo & Title -->
<div class="text-center mb-10">
            <a href="index_v2.html" class="hover:opacity-80 transition-opacity">
                <h1 class="text-4xl font-syne font-extrabold tracking-tighter text-white mb-2 uppercase">KAMIWEAR</h1>
            </a>
<div class="flex justify-center mt-6 border-b border-white/10">
<button class="px-6 pb-4 text-sm font-bold border-b-2 border-primary text-white tracking-widest">SIGN IN</button>
<button class="px-6 pb-4 text-sm font-bold border-b-2 border-transparent text-slate-500 hover:text-slate-300 tracking-widest transition-colors">SIGN UP</button>
</div>
</div>
<!-- Sign In Form -->
<div class="space-y-6">
<div class="space-y-2">
<h3 class="text-2xl font-syne font-bold text-white">Welcome back.</h3>
<p class="text-brand-lavender/60 text-sm">Enter your credentials to access your Kamiwear account.</p>
</div>
<div class="space-y-4">
<!-- Email Field -->
<div class="relative group">
<input class="peer input-glass w-full rounded-lg h-14 px-4 pt-4 text-white placeholder-transparent focus:outline-none" id="email" placeholder="Email" type="email"/>
<label class="absolute left-4 top-1 text-[10px] uppercase font-bold text-brand-lavender/50 tracking-widest transition-all peer-placeholder-shown:text-base peer-placeholder-shown:top-4 peer-focus:top-1 peer-focus:text-[10px] pointer-events-none" for="email">Email Address</label>
</div>
<!-- Password Field -->
<div class="relative group">
<input class="peer input-glass w-full rounded-lg h-14 px-4 pt-4 text-white placeholder-transparent focus:outline-none" id="password" placeholder="Password" type="password"/>
<label class="absolute left-4 top-1 text-[10px] uppercase font-bold text-brand-lavender/50 tracking-widest transition-all peer-placeholder-shown:text-base peer-placeholder-shown:top-4 peer-focus:top-1 peer-focus:text-[10px] pointer-events-none" for="password">Password</label>
<button class="absolute right-4 top-4 text-brand-lavender/40 hover:text-white transition-colors">
<span class="material-symbols-outlined text-lg">visibility</span>
</button>
</div>
<div class="flex justify-end">
<a class="text-xs font-medium text-brand-lavender hover:text-primary transition-colors" href="#">Forgot password?</a>
</div>
</div>
<!-- CTA Actions -->
<div class="space-y-4 pt-2">
<button class="w-full h-14 bg-primary text-background-dark font-bold text-sm tracking-[0.2em] rounded-full hover:scale-[1.02] active:scale-95 transition-all shadow-[0_0_20px_rgba(249,232,6,0.2)]">
                        SIGN IN
                    </button>
<div class="relative py-2">
<div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div>
<div class="relative flex justify-center text-xs"><span class="bg-transparent px-2 text-slate-500 uppercase tracking-widest">OR</span></div>
</div>
<button class="w-full h-14 input-glass flex items-center justify-center gap-3 rounded-full hover:bg-white/10 transition-colors">
<svg class="w-5 h-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-sm font-bold text-white tracking-widest">CONTINUE WITH GOOGLE</span>
</button>
</div>
</div>
</div>
</main>
<!-- Footer -->
<footer class="absolute bottom-8 w-full text-center px-6 z-10">
<p class="text-[10px] text-brand-lavender/40 uppercase tracking-[0.2em] max-w-xs mx-auto">
            By continuing, you agree to our <a class="underline hover:text-primary transition-colors" href="#">Terms</a> &amp; <a class="underline hover:text-primary transition-colors" href="#">Privacy Policy</a>
</p>
</footer>
</body></html>
